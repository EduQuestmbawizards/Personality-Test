<style>

/* RESET */
@page {
    size: A4;
    margin: 0;
}

body {
    margin: 0;
    padding: 0;
}

/* PAGE */
.page {
    width: 210mm;
    height: 297mm;
    background: #e6e6e6;
    position: relative;
    font-family: Arial, sans-serif;
}

/* ================= HEADER ================= */

.title {
    position: absolute;
    top: 25mm;
    left: 20mm;

    font-size: 6mm;
    font-weight: 800;
}

.subtitle {
    position: absolute;
    top: 33mm;
    left: 20mm;

    font-size: 5mm;
    font-weight: bold;
}

/* LOGO */
.logo {
    position: absolute;
    top: 20mm;
    right: 20mm;

    width: 18mm;
    height: 18mm;

    border-radius: 50%;
    border: 0.5mm solid red;
    overflow: hidden;
    background: white;
}

.logo img {
    width: 100%;
    height: 100%;
}

/* ================= CONTENT ================= */

.strength-container {
    position: absolute;
    top: 80mm;
    left: 20mm;
    width: 170mm;
}

/* CARD */
.strength-card {
    width: 170mm;

    background: white;
    border-radius: 3mm;

    padding: 5mm;
    margin-bottom: 6mm;
}

/* TITLE */
.strength-card h3 {
    margin: 0;
    font-size: 4.5mm;
}

/* TEXT */
.strength-card p {
    margin-top: 2mm;
    font-size: 3.5mm;
    color: #444;
    line-height: 5mm;
}

/* ================= FOOTER ================= */

.bottom-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 210mm;
    height: 3mm;
}

.bottom-strip div {
    position: absolute;
    height: 3mm;
}

/* EXACT WIDTH */
.s1 { left: 0mm;   width: 42mm; background: #3f5ea8; }
.s2 { left: 42mm;  width: 42mm; background: #e53935; }
.s3 { left: 84mm;  width: 42mm; background: #d81b60; }
.s4 { left: 126mm; width: 42mm; background: #fb8c00; }
.s5 { left: 168mm; width: 42mm; background: #42a5f5; }

</style>
</head>

<body>

<div class="page">

    <!-- HEADER -->
    <div class="title">APTITUDE ASSESSMENT</div>
    <br>
    <div class="subtitle">YOUR TOP 3 STRENGTHS</div>

    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo-removebg-preview.png', _external=True) }}">
    </div>

    <!-- CONTENT -->
    <div class="strength-container">

        {% for s in data.strengths[:3] %}
        <div class="strength-card">
            <h3>{{ s.title }}</h3>

            {% if s.description %}
            <p>{{ s.description }}</p>
            {% endif %}
        </div>
        {% endfor %}

    </div>

    <!-- FOOTER -->
    <div class="bottom-strip">
        <div class="s1"></div>
        <div class="s2"></div>
        <div class="s3"></div>
        <div class="s4"></div>
        <div class="s5"></div>
    </div>

</div>
