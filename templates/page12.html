<style>

/* RESET */
@page {
    size: A4;
    margin: 0;
}

body {
    margin: 0;
    padding: 0;
}

/* PAGE */
.page {
    width: 210mm;
    height: 297mm;
    background: #f4f4f4;
    position: relative;
    font-family: Arial, sans-serif;
}

/* ================= HEADER ================= */

/* TITLE */
.title {
    position: absolute;
    top: 20mm;
    left: 20mm;

    font-size: 7mm;
    font-weight: 900;
    color: #e53935;
}

/* SUBTITLE */
.subtitle {
    position: absolute;
    top: 30mm;
    left: 20mm;

    font-size: 6mm;
    font-weight: 900;
}

/* SECTION TEXT */
.section-text {
    position: absolute;
    top: 38mm;
    left: 20mm;

    font-size: 4mm;
    font-weight: bold;
}

/* LOGO */
.logo {
    position: absolute;
    top: 20mm;
    right: 20mm;

    width: 18mm;
    height: 18mm;

    border-radius: 50%;
    border: 0.5mm solid red;
    overflow: hidden;
    background: white;
}

.logo img {
    width: 100%;
    height: 100%;
}

/* ================= CONTENT ================= */

.ai-content {
    position: absolute;
    top: 60mm;
    left: 20mm;
    width: 170mm;
}

/* CARD */
.card {
    width: 170mm;

    background: white;
    border-radius: 3mm;

    padding: 5mm;
    margin-bottom: 6mm;
}

/* TITLE */
.card h3 {
    margin: 0;
    font-size: 4.5mm;
}

/* TEXT */
.card p {
    font-size: 3.5mm;
    margin-top: 2mm;
    line-height: 5mm;
}

/* ================= QUOTE ================= */

.quote {
    position: absolute;
    bottom: 50mm;
    left: 20mm;
    width: 120mm;

    font-size: 4.5mm;
    line-height: 6mm;
}

.quote span {
    color: #e53935;
    font-weight: bold;
}

/* ================= FOOTER ================= */

.footer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 210mm;
    height: 3mm;
}

.footer div {
    position: absolute;
    height: 3mm;
}

/* EXACT STRIP */
.s1 { left: 0mm;   width: 42mm; background: #3f5ea8; }
.s2 { left: 42mm;  width: 42mm; background: #e53935; }
.s3 { left: 84mm;  width: 42mm; background: #d81b60; }
.s4 { left: 126mm; width: 42mm; background: #fb8c00; }
.s5 { left: 168mm; width: 42mm; background: #42a5f5; }

</style>
</head>

<body>

<div class="page">

    <!-- HEADER -->
    <div class="title">PROFILE BUILDING</div>
    <div class="subtitle">RECOMMENDATIONS</div>
    <div class="section-text">Academic Recommendations</div>

    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo-removebg-preview.png', _external=True) }}">
    </div>

    <!-- CONTENT -->
    <div class="ai-content">

        {% for item in data.academic[:4] %}
        <div class="card">
            <h3>{{ item.title }}</h3>
            <p>{{ item.description }}</p>
        </div>
        {% endfor %}

    </div>

    <!-- QUOTE -->
    <div class="quote">
        "The difference between<br>
        <span>Ordinary</span> and <span>Extraordinary</span><br>
        is that <span>little extra</span>"
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="s1"></div>
        <div class="s2"></div>
        <div class="s3"></div>
        <div class="s4"></div>
        <div class="s5"></div>
    </div>

</div>
