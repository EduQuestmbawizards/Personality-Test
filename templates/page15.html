<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

/* RESET */
@page {
    size: A4;
    margin: 0;
}

body {
    margin: 0;
    padding: 0;
}

/* PAGE */
.page {
    width: 210mm;
    height: 297mm;
    background: #f4f4f4;
    position: relative;
    font-family: Arial, sans-serif;
}

/* ================= HEADER ================= */

.title {
    position: absolute;
    top: 20mm;
    left: 20mm;

    font-size: 6mm;
    font-weight: 800;
}

.section-text {
    position: absolute;
    top: 28mm;
    left: 20mm;

    font-size: 4mm;
    font-weight: bold;
}

/* LOGO */
.logo {
    position: absolute;
    top: 20mm;
    right: 20mm;

    width: 18mm;
    height: 18mm;

    border-radius: 50%;
    border: 0.5mm solid red;
    overflow: hidden;
    background: white;
}

.logo img {
    width: 100%;
    height: 100%;
}

/* ================= CONTENT ================= */

.ai-content {
    position: absolute;
    top: 55mm;
    left: 20mm;
    width: 170mm;
}

/* BLOCK */
.scholarship-block {
    margin-bottom: 5mm;
}

.scholarship-title {
    font-size: 4.5mm;
    font-weight: bold;
}

.scholarship-desc {
    font-size: 3.5mm;
    margin-top: 2mm;
    line-height: 5mm;
    color: #333;
}

/* ================= FOOTER ================= */

.footer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 210mm;
    height: 3mm;
}

.footer div {
    position: absolute;
    height: 3mm;
}

/* EXACT STRIP */
.s1 { left: 0mm;   width: 42mm; background: #3f5ea8; }
.s2 { left: 42mm;  width: 42mm; background: #e53935; }
.s3 { left: 84mm;  width: 42mm; background: #d81b60; }
.s4 { left: 126mm; width: 42mm; background: #fb8c00; }
.s5 { left: 168mm; width: 42mm; background: #42a5f5; }

</style>
</head>

<body>

<div class="page">

    <!-- HEADER -->
    <div class="title">SCHOLARSHIP INSIGHTS</div>
    <div class="section-text">International Student Scholarships</div>

    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo-removebg-preview.png', _external=True) }}">
    </div>

    <!-- CONTENT -->
    <div class="ai-content">

        {% for s in data.scholarships[:5] %}
        <div class="scholarship-block">
            <div class="scholarship-title">{{ s.title }}</div>
            <div class="scholarship-desc">{{ s.description }}</div>
        </div>
        {% endfor %}

    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="s1"></div>
        <div class="s2"></div>
        <div class="s3"></div>
        <div class="s4"></div>
        <div class="s5"></div>
    </div>

</div>

</body>
</html>
