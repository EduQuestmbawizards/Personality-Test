<style>

/* RESET */
@page {
    size: A4;
    margin: 0;
}

body {
    margin: 0;
    padding: 0;
}

/* PAGE */
.page {
    width: 210mm;
    height: 297mm;
    position: relative;
    background: #e6e6e6;
    font-family: Arial, sans-serif;
}

/* ================= HEADER ================= */

/* TITLE */
.title {
    position: absolute;
    top: 25mm;
    left: 20mm;

    font-size: 8mm;
    font-weight: 800;
    line-height: 1.3;
}

/* LOGO */
.logo {
    position: absolute;
    top: 20mm;
    right: 20mm;

    width: 18mm;
    height: 18mm;

    border-radius: 50%;
    border: 0.5mm solid red;
    overflow: hidden;
    background: white;
}

.logo img {
    width: 100%;
    height: 100%;
}

/* ================= CAREER CARDS ================= */

.career-container {
    position: absolute;
    top: 70mm;
    left: 20mm;
    width: 170mm;
}

/* CARD */
.career-card {
    position: relative;
    width: 170mm;

    background: white;
    border-radius: 3mm;

    padding: 4mm;
    margin-bottom: 5mm;
}

/* TITLE */
.career-card h3 {
    margin: 0;
    font-size: 4.5mm;
}

/* TEXT */
.career-card p {
    font-size: 3.5mm;
    margin-top: 2mm;
    line-height: 5mm;
}

/* ================= BOTTOM STRIP ================= */

.bottom-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 210mm;
    height: 3mm;
}

/* STRIP BLOCKS */
.bottom-strip div {
    position: absolute;
    height: 3mm;
}

/* EXACT WIDTH */
.s1 { left: 0mm;   width: 42mm; background: #3f5ea8; }
.s2 { left: 42mm;  width: 42mm; background: #e53935; }
.s3 { left: 84mm;  width: 42mm; background: #d81b60; }
.s4 { left: 126mm; width: 42mm; background: #fb8c00; }
.s5 { left: 168mm; width: 42mm; background: #42a5f5; }

</style>
</head>

<body>

<div class="page">

    <!-- TITLE -->
    <div class="title">
        FUTURISTIC INTERDISCIPLINARY<br>
        CAREERS
    </div>

    <!-- LOGO -->
    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo-removebg-preview.png', _external=True) }}">
    </div>

    <!-- CAREERS -->
    <div class="career-container">

        {% for career in data.futuristic_careers[:5] %}
        <div class="career-card">
            <h3>{{ career.title }}</h3>
            <p>{{ career.description }}</p>
        </div>
        {% endfor %}

    </div>

    <!-- BOTTOM STRIP -->
    <div class="bottom-strip">
        <div class="s1"></div>
        <div class="s2"></div>
        <div class="s3"></div>
        <div class="s4"></div>
        <div class="s5"></div>
    </div>

</div>
